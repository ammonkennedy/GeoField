version: 1
backend:
  phases:
    build:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.15.9 --activate
        - pnpm install --no-frozen-lockfile
        - pnpm rebuild esbuild
        - pnpm exec -- esbuild --version
        - pnpm exec -- ampx pipeline-deploy --app-id=d2vn10cqbsssgw --branch=master
frontend:
  phases:
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=4096"
        - corepack enable
        - corepack prepare pnpm@9.15.9 --activate
        - pnpm --filter @workspace/geofield build
  artifacts:
    baseDirectory: artifacts/geofield/dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - artifacts/geofield/node_modules/**/*
      - lib/api-client-react/node_modules/**/*
